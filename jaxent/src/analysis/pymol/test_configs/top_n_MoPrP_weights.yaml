render:
  spectrum_colours: "blue cyan yellow orange red"
  spectrum_range: [0.0, 1.0]     # adjust to actual weight range if needed
  putty_transform: 7
  putty_range: [0.4, 4.0]
  trajectory_transparency: 0.7
  reference_transparency: 0.9
  transparency_mode: 1
  orthoscopic_view: true
  antialias: 2
  ray_trace_mode: 0
  ray_transparency_oblique: false
  ray_trace_on_save: false
  view: [0.885161281, -0.063157849,  0.460974962,
         0.178213656,  0.961208284, -0.210514292,
        -0.429795146,  0.268488705,  0.862078071,
         0.000000000,  0.000000000, -144.799575806,
         2.093294144, -0.038471222,  -0.517147064,
        79.905242920, 209.693969727,  20.000000000]

general:
  references:
    - "2L39_crop.pdb"
  reference_labels:
    - "NMR"
  reference_colors:
    - "white"
  trajectory_label: "MoPrP_ensemble"
  align_atoms: "name CA"
  align_selection: "resid 79-93"
  working_dir: "/Users/alexi/Library/CloudStorage/OneDrive-Nexus365/Rotation_Projects/Rotation_3/Papers/jaxENT/MoPrP Clusters/Confirmation"

