# Experiment 2: CrossValidation - AF2_filtered and AF2_MSAss ensembles
ensembles:
  - AF2_filtered
  - AF2_MSAss

loss_functions:
  - mcMSE
  - MSE
  - Sigma_MSE

num_splits: 3

convergence_rates:
  - 1.0e-3
  - 1.0e-4
  - 1.0e-5
  - 1.0e-6
  - 1.0e-7
  - 1.0e-8
  - 1.0e-9
  - 1.0e-10

# Paths (relative to experiment directory)
results_prefix: "fitting/jaxENT/_optimise_quick_test_FIGURE_SIGMA_500__"  # Finds most recent matching dir
features_dir: "fitting/jaxENT/_featurise"
datasplit_dir: "fitting/jaxENT/_datasplits"
clustering_dir: "analysis/_MoPrP_analysis_clusters_feature_spec_AF2_test/clusters"
output_dir: "analysis/_analysis_loss_output"
state_ratios_json: "analysis/state_ratios.json"

# Plotting style
style:
  ensemble_colors:
    AF2_filtered: "Cyan"
    AF2_MSAss: "RoyalBlue"

  loss_markers:
    mcMSE: "o"
    MSE: "s"
    Sigma_MSE: "^"

  split_type_colors:
    r: "fuchsia"
    s: "black"
    R3: "green"
    sequence_cluster: "green"
    Sp: "grey"
    spatial: "grey"

  dpi: 300
  figsize_wide: [16, 6]
  figsize_square: [10, 10]

# Scoring configuration
scoring:
  ensemble_feature_map:
    AF2_filtered: "AF2_filtered"
    AF2_MSAss: "AF2_MSAss"

  ensemble_clustering_map:
    AF2_filtered: "AF2_Filtered"
    AF2_MSAss: "AF2_MSAss"

  state_mapping:
    0: "Folded"
    1: "PUF1"
    2: "PUF2"
    4: "unfolded"

  scoring_weights:
    train_penalty: 0.9
    kl_penalty: 0.1
