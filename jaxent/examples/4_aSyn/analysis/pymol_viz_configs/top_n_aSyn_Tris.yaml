top_n:
  trajectory: "data/_aSyn/tris_MD/tris_all_combined.xtc,data/_aSyn/tris_MD/md_mol_center_coil.pdb"
  weights: "fitting/_processed__optimise_aSyn_BV_test_5000_20260420_222302/_extracted__processed__optimise_aSyn_BV_test_5000_20260420_222302/val_mse_min/Tris_only_MSE_sequence_cluster_L1_selected.npz"
  colour_metric: "weight"     
  top_n: 20 # top-N = frames with highest replicate-average weight
  transparency_range: [0.2, 0.6]  
  transparency_metric: "weight" # opacity â†’ weight rank (or "RMSD" for RMSD rank)
