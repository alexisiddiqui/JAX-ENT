# Top-N structures â€” MoPrP ensemble, metric=weight
# Based on _reference/MoPrP_weighted_SASA_test.py settings
#
# Selects the 20 frames with the highest replicate-average weight.
# Frames are coloured on a whiteâ†’greyâ†’green scale by log-weight.
# The full ensemble is shown in the background coloured blueâ†’cyanâ†’yellowâ†’orangeâ†’red by weight.
#
# Usage (inside PyMOL):
#   run Top_N_structures.py test_configs/top_n_MoPrP_weights.yaml

# Usage (command line, recommended):
# conda activate PYMOL_ANA
# pymol -r jaxent/src/analysis/pymol/Top_N_structures.py --config jaxent/examples/4_aSyn/analysis/pymol_viz_configs/top_n_aSyn_Tris.yaml

render:
  spectrum_colours: "white_cyan_blue_density_purple_black"
  spectrum_range: [4.0, 0.0]     # adjust to actual weight range if needed
  putty_transform: 7
  putty_range: [1.0, 1.0]
  trajectory_transparency: 0.1
  reference_transparency: 0.7
  transparency_mode: 1
  orthoscopic_view: true
  antialias: 1
  ray_trace_mode: 0
  ray_transparency_oblique: false
  ray_trace_on_save: false


general:
  references:
    - "data/_aSyn/2kkw.pdb"
  reference_labels:
    - "NMR"
  reference_colors:
    - "grey"
  trajectory_label: "aSyn_ensemble"
  align_atoms: "name CA"
  align_selection: "resid 15-45"
  working_dir: "/Users/alexi/JAX-ENT/jaxent/examples/4_aSyn"

output:
  save_png: false
  save_session: false
  output_prefix: "aSyn_TopN"

