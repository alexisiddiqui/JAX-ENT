top_n:
  trajectory: "data/_aSyn/tris_MD/tris_all_combined.xtc,data/_aSyn/tris_MD/md_mol_center_coil.pdb"
  weights: "fitting/_processed__optimise_aSyn_BV_FIGURE_5000_20260522_020324/_extracted__processed__optimise_aSyn_BV_FIGURE_5000_20260522_020324/val_mse_min/Extracellular_MSE_sequence_cluster_L1_selected.npz"
  colour_metric: "weight"     
  top_n: 10 # top-N = frames with highest replicate-average weight
  transparency_range: [0.2, 0.6]  
  transparency_metric: "weight" # opacity → weight rank (or "RMSD" for RMSD rank)
