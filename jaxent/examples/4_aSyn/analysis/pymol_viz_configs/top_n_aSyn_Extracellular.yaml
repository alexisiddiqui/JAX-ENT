# Top-N structures — MoPrP ensemble, metric=weight
# Based on _reference/MoPrP_weighted_SASA_test.py settings
#
# Selects the 20 frames with the highest replicate-average weight.
# Frames are coloured on a white→grey→green scale by log-weight.
# The full ensemble is shown in the background coloured blue→cyan→yellow→orange→red by weight.
#
# Usage (inside PyMOL):
#   run Top_N_structures.py test_configs/top_n_MoPrP_weights.yaml

render:
  spectrum_colours: "white_greencyan_teal_francium_black"
  spectrum_range: [4.0, 0.0]     # adjust to actual weight range if needed
  putty_transform: 7
  putty_range: [1.0, 1.0]
  trajectory_transparency: 0.1
  reference_transparency: 0.7
  transparency_mode: 1
  orthoscopic_view: true
  ambient: 0.5
  antialias: 4
  ray_trace_mode: 1
  ray_transparency_oblique: true
  view: [
     0.997327805,    0.022934997,    0.069376633,
    -0.008219078,    0.978643894,   -0.205389723,
    -0.072606139,    0.204270765,    0.976217270,
    -0.000001937,   -0.000001203, -445.275817871,
    39.923847198,  -30.274959564,   41.547569275,
   396.320892334,  494.230743408,   20.000000000
  ]


general:
  references:
    - "data/_aSyn/2kkw.pdb"
  reference_labels:
    - "NMR"
  reference_colors:
    - "cerium"
  trajectory_label: "aSyn_ensemble"
  align_atoms: "name CA"
  align_selection: "resid 15-45"
  working_dir: "/Users/alexi/JAX-ENT/jaxent/examples/4_aSyn"

output:
  save_png: false
  save_session: false
  output_prefix: "aSyn_TopN"

